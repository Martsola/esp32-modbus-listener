; PlatformIO Project Configuration File
;
; ESP32 Modbus Listener
;
; Passive Modbus RTU listener for Acrel ADL400 energy meters.
; Monitors bus traffic, parses meter data, publishes via MQTT.
;
; Please visit documentation for more options and examples:
; https://docs.platformio.org

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Build flags
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; Library dependencies
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0

; Partition scheme (4MB flash with SPIFFS)
board_build.partitions = default.csv

; Additional board settings
board_build.flash_mode = dio
board_build.f_cpu = 160000000L

[env:esp32c3-debug]
extends = env:esp32c3
build_type = debug
build_flags = 
    ${env:esp32c3.build_flags}
    -DCORE_DEBUG_LEVEL=4
